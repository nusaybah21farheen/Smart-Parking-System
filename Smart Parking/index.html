<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Al Yamamah Parking System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">
    <img src="yulogo.svg" width="150" height="100">
    <h1>Al Yamamah Smart Parking</h1>
  </div>

  <ul>
    <li><a href="index.html" class="active">Main Page</a></li>
    <li><a href="sensor.html">Sensor Monitoring</a></li>
    <li><a href="reservation.html">Reservation Booking</a></li>
    <li><a href="ai.html">AI Camera</a></li>
  </ul>
</nav>

<!-- MAIN -->
<div class="container">
  <h2>Parking Overview</h2>

  <!-- CARDS -->
<div class="cards">
  <div class="glass card">
    <h3>Total Slots</h3>
      <span id="total">16</span>
  </div>

    <div class="glass card">
      <h3>Occupied</h3>
      <span id="occupied">4</span>
    </div>

    <div class="glass card">
      <h3>Reserved</h3>
      <span id="reserved">4</span>
    </div>

    <div class="glass card">
      <h3>Available</h3>
      <span id="available">4</span>
    </div>
</div>

  <!-- PARKING MAP -->
  <div class="map glass">
    <h3>Live Parking Layout</h3>
    <select id="gateSelect" onchange="loadGate()">
        <option value="1">Gate 1</option>
        <option value="2">Gate 2</option>
        <option value="3">Gate 3</option>
        <option value="4">Gate 4</option>
      </select>
    </div>

    <div id="slotContainer" class="slot"></div>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
