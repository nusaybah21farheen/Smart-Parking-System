<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sensor Monitoring</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="logo">
    <img src="yulogo.svg" width="150" height="100">
    <h1>Al Yamamah Parking</h1>
  </div>

  <ul>
    <li><a href="index.html">Main Page</a></li>
    <li><a href="sensor.html" class="active">Sensor Monitoring</a></li>
    <li><a href="reservation.html">Reservation Booking</a></li>
    <li><a href="ai.html">AI Camera</a></li>
  </ul>
</nav>

<div class="container">
  <div class="sensor-layout">

    <div class="glass sensor-box">
      <h2>Sensor Monitoring</h2>
      <div class="sensor-data">
      <p><strong>Selected Slot:</strong><span id="selectedSlot">None</span></p>
      <p><strong>Status:</strong> <span id="status">Select a slot</span></p>
      <p><strong>Time:</strong> <span id="time">--:--:--</span></p>
      </div>
      <button id="reserveBtn" onclick="reserveSlot()" diabled>Book This Slot</button>
    </div>

    
    <div class="glass slot-booking">
      <h2>Slot Booking</h2>
      <select id="gateSelect" onchange="changeGate()">
        <option value="1">Gate 1</option>
        <option value="2">Gate 2</option>
        <option value="3">Gate 3</option>
        <option value="4">Gate 4</option>
      </select>
      <div id="slotContainer" class="slots"></div>
      </div>

    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
